<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Base64转换 - WgH</title>
<style>
:root{--primary:#4361ee;--secondary:#f72585;--gradient:linear-gradient(135deg,var(--primary),var(--secondary));}*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif;}body{background:linear-gradient(135deg,#f5f7ff 0%,#f0f4ff 100%);min-height:100vh;padding:20px;}.container{max-width:800px;margin:0 auto;}.header{text-align:center;margin-bottom:30px;padding:30px 0;}.title{font-size:2rem;font-weight:800;margin-bottom:10px;background:var(--gradient);-webkit-background-clip:text;background-clip:text;color:transparent;}.subtitle{color:#666;}.tool-container{background:white;border-radius:20px;padding:30px;box-shadow:0 8px 30px rgba(0,0,0,0.08);margin-bottom:20px;}.mode-selector{display:grid;grid-template-columns:1fr 1fr;gap:15px;margin-bottom:20px;}.mode-btn{padding:15px;border:2px solid #e0e0e0;border-radius:10px;text-align:center;cursor:pointer;}.mode-btn.active{border-color:var(--primary);background:rgba(67,97,238,0.1);}.mode-name{font-weight:600;margin-bottom:5px;}.editor-container{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin:20px 0;}.editor-box{border:2px solid #e0e0e0;border-radius:10px;overflow:hidden;}.editor-header{background:#f8f9fa;padding:10px 15px;border-bottom:1px solid #e0e0e0;font-weight:600;}.editor-textarea{width:100%;height:200px;border:none;padding:15px;font-family:'Courier New',monospace;font-size:14px;resize:none;outline:none;}.process-btn{background:var(--gradient);color:white;border:none;padding:12px;border-radius:25px;font-weight:600;cursor:pointer;width:100%;margin:10px 0;}.file-upload{border:2px dashed #e0e0e0;border-radius:10px;padding:30px;text-align:center;margin:15px 0;cursor:pointer;}.file-upload:hover{border-color:var(--primary);}.copy-btn{background:#f72585;color:white;border:none;padding:10px 20px;border-radius:20px;cursor:pointer;margin:5px;}.footer{text-align:center;color:#666;margin-top:30px;padding:20px;}.footer a{color:var(--primary);text-decoration:none;}
</style>
</head>
<body>
<div class="container">
<div class="header">
<h1 class="title">Base64转换</h1>
<p class="subtitle">wghub免费Base64编码解码，支持文本和文件</p>
</div>
<div class="tool-container">
<div class="mode-selector">
<div class="mode-btn active" data-mode="encode">
<div class="mode-name">Base64编码</div>
</div>
<div class="mode-btn" data-mode="decode">
<div class="mode-name">Base64解码</div>
</div>
</div>
<div class="file-upload" id="fileUpload">
<div>📁</div>
<p>点击选择文件或拖拽文件到此区域</p>
<input type="file" id="fileInput" style="display:none">
</div>
<div class="editor-container">
<div class="editor-box">
<div class="editor-header">文本输入</div>
<textarea class="editor-textarea" id="inputText" placeholder="请输入要编码的文本或粘贴Base64字符串...">Hello WgHub!</textarea>
</div>
<div class="editor-box">
<div class="editor-header">转换结果</div>
<textarea class="editor-textarea" id="outputText" readonly placeholder="输出..."></textarea>
</div>
</div>
<button class="process-btn" id="processBtn">开始转换</button>
<div style="text-align:center;">
<button class="copy-btn" id="copyBtn">复制</button>
<button class="copy-btn" id="clearBtn">清空</button>
</div>
</div>
<div class="footer">
<a href="https://hub.j47v.top" target="_blank">https://hub.j47v.top</a>
</div>
</div>
<script>
let selectedMode='encode';const modeButtons=document.querySelectorAll('.mode-btn');const fileUpload=document.getElementById('fileUpload');const fileInput=document.getElementById('fileInput');const inputText=document.getElementById('inputText');const outputText=document.getElementById('outputText');const processBtn=document.getElementById('processBtn');const copyBtn=document.getElementById('copyBtn');const clearBtn=document.getElementById('clearBtn');modeButtons.forEach(btn=>{btn.addEventListener('click',()=>{modeButtons.forEach(b=>b.classList.remove('active'));btn.classList.add('active');selectedMode=btn.dataset.mode;updateUI();});});fileUpload.addEventListener('click',()=>fileInput.click());fileUpload.addEventListener('dragover',(e)=>{e.preventDefault();fileUpload.style.borderColor='var(--primary)';});fileUpload.addEventListener('dragleave',()=>{fileUpload.style.borderColor='#e0e0e0';});fileUpload.addEventListener('drop',(e)=>{e.preventDefault();fileUpload.style.borderColor='#e0e0e0';const file=e.dataTransfer.files[0];handleFileSelect(file);});fileInput.addEventListener('change',(e)=>{if(e.target.files[0])handleFileSelect(e.target.files[0]);});function handleFileSelect(file){const reader=new FileReader();reader.onload=(e)=>{if(selectedMode==='encode'){inputText.value=e.target.result.split(',')[1];}else{inputText.value=e.target.result;}};if(selectedMode==='encode'){reader.readAsDataURL(file);}else{reader.readAsText(file);}}processBtn.addEventListener('click',()=>{const input=inputText.value.trim();if(!input){alert('请输入内容！');return;}try{if(selectedMode==='encode'){outputText.value=btoa(unescape(encodeURIComponent(input)));}else{outputText.value=decodeURIComponent(escape(atob(input)));}}catch(error){alert('转换失败：'+error.message);}});copyBtn.addEventListener('click',()=>{outputText.select();document.execCommand('copy');alert('已复制到剪贴板！');});clearBtn.addEventListener('click',()=>{inputText.value='';outputText.value='';});function updateUI(){fileUpload.style.display=selectedMode==='encode'?'block':'none';}updateUI();
</script>
</body>
</html>
