<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>图片压缩 - WgH</title>
<style>
:root{--primary:#4361ee;--secondary:#f72585;--gradient:linear-gradient(135deg,var(--primary),var(--secondary));}*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif;}body{background:linear-gradient(135deg,#f5f7ff 0%,#f0f4ff 100%);min-height:100vh;padding:20px;}.container{max-width:800px;margin:0 auto;}.header{text-align:center;margin-bottom:30px;padding:30px 0;}.title{font-size:2rem;font-weight:800;margin-bottom:10px;background:var(--gradient);-webkit-background-clip:text;background-clip:text;color:transparent;}.subtitle{color:#666;}.tool-container{background:white;border-radius:20px;padding:30px;box-shadow:0 8px 30px rgba(0,0,0,0.08);}.upload-area{border:2px dashed #e0e0e0;border-radius:10px;padding:40px;text-align:center;margin-bottom:20px;cursor:pointer;}.upload-area:hover{border-color:var(--primary);}.upload-icon{font-size:3rem;color:#ccc;margin-bottom:10px;}.format-options{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:15px 0;}.format-btn{padding:10px;border:2px solid #e0e0e0;border-radius:8px;text-align:center;cursor:pointer;}.format-btn.active{border-color:var(--primary);background:rgba(67,97,238,0.1);}.compression-levels{display:grid;grid-template-columns:repeat(3,1fr);gap:15px;margin:20px 0;}.level-btn{padding:15px;border:2px solid #e0e0e0;border-radius:10px;text-align:center;cursor:pointer;}.level-btn:hover,.format-btn:hover{transform:translateY(-2px);}.level-btn.active{border-color:var(--primary);background:rgba(67,97,238,0.1);}.level-name{font-weight:600;margin-bottom:5px;}.level-desc{font-size:0.8rem;color:#666;}.compress-btn{background:var(--gradient);color:white;border:none;padding:12px;border-radius:25px;font-weight:600;cursor:pointer;width:100%;margin:10px 0;}.compress-btn:disabled{background:#ccc;cursor:not-allowed;}.timer-text{text-align:center;color:#f72585;font-weight:600;margin:10px 0;display:none;}.result-section{display:none;text-align:center;padding:20px;border:2px dashed #e0e0e0;border-radius:15px;margin-top:20px;background:#f8faff;}.comparison{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin:20px 0;}.image-box{border-radius:10px;overflow:hidden;}.image-box img{width:100%;height:auto;display:block;}.size-info{font-size:0.9rem;color:#666;margin:5px 0;}.download-btn{background:#f72585;color:white;border:none;padding:10px 20px;border-radius:20px;text-decoration:none;margin-top:10px;display:inline-block;}
</style>
</head>
<body>
<div class="container">
<div class="header">
<h1 class="title">图片压缩</h1>
<p class="subtitle">wghub免费图片压缩，支持多种格式输出</p>
</div>
<div class="tool-container">
<div class="upload-area" id="uploadArea">
<div class="upload-icon">📁</div>
<p>点击或拖拽图片到这里</p>
<input type="file" id="fileInput" accept="image/*" style="display:none">
</div>
<div class="format-options">
<div class="format-btn" data-format="jpg">JPG</div>
<div class="format-btn" data-format="png">PNG</div>
<div class="format-btn" data-format="webp">WebP</div>
</div>
<div class="compression-levels">
<div class="level-btn" data-level="light">
<div class="level-name">轻度压缩</div>
<div class="level-desc">减小30%-50%</div>
</div>
<div class="level-btn" data-level="medium">
<div class="level-name">中度压缩</div>
<div class="level-desc">减小50%-70%</div>
</div>
<div class="level-btn" data-level="soviet">
<div class="level-name">高度压缩</div>
<div class="level-desc">清朝级保密画质</div>
</div>
</div>
<div class="timer-text" id="timerText">请等待 <span id="countdown">60</span> 秒后再次压缩</div>
<button class="compress-btn" id="compressBtn" disabled>开始压缩</button>
<div class="result-section" id="resultSection">
<div class="comparison">
<div class="image-box">
<h4>原图</h4>
<img id="originalImage">
<div class="size-info" id="originalSize"></div>
</div>
<div class="image-box">
<h4>输出</h4>
<img id="compressedImage">
<div class="size-info" id="compressedSize"></div>
</div>
</div>
<a href="#" class="download-btn" id="downloadBtn">下载</a>
</div>
</div>
</div>
<p class="subtitle">https://wghub.netlify.app</p>
<script>
let selectedFile=null;let selectedLevel=null;let selectedFormat='jpg';let canCompress=true;let countdown=60;const uploadArea=document.getElementById('uploadArea');const fileInput=document.getElementById('fileInput');const compressBtn=document.getElementById('compressBtn');const resultSection=document.getElementById('resultSection');const originalImage=document.getElementById('originalImage');const compressedImage=document.getElementById('compressedImage');const downloadBtn=document.getElementById('downloadBtn');const originalSize=document.getElementById('originalSize');const compressedSize=document.getElementById('compressedSize');const levelButtons=document.querySelectorAll('.level-btn');const formatButtons=document.querySelectorAll('.format-btn');const timerText=document.getElementById('timerText');uploadArea.addEventListener('click',()=>fileInput.click());uploadArea.addEventListener('dragover',(e)=>{e.preventDefault();uploadArea.style.borderColor='var(--primary)';});uploadArea.addEventListener('dragleave',()=>{uploadArea.style.borderColor='#e0e0e0';});uploadArea.addEventListener('drop',(e)=>{e.preventDefault();uploadArea.style.borderColor='#e0e0e0';const file=e.dataTransfer.files[0];handleFileSelect(file);});fileInput.addEventListener('change',(e)=>{if(e.target.files[0])handleFileSelect(e.target.files[0]);});levelButtons.forEach(btn=>{btn.addEventListener('click',()=>{levelButtons.forEach(b=>b.classList.remove('active'));btn.classList.add('active');selectedLevel=btn.dataset.level;updateCompressButton();});});formatButtons.forEach(btn=>{btn.addEventListener('click',()=>{formatButtons.forEach(b=>b.classList.remove('active'));btn.classList.add('active');selectedFormat=btn.dataset.format;updateCompressButton();});});function handleFileSelect(file){if(!file.type.startsWith('image/')){alert('请选择图片文件！');return;}selectedFile=file;const reader=new FileReader();reader.onload=(e)=>{originalImage.src=e.target.result;originalSize.textContent=`原图大小: ${formatFileSize(file.size)}`;uploadArea.innerHTML=`<div style="color:var(--primary)">✓ 已选择: ${file.name}</div>`;updateCompressButton();};reader.readAsDataURL(file);}function updateCompressButton(){compressBtn.disabled=!(selectedFile&&selectedLevel&&selectedFormat&&canCompress);}compressBtn.addEventListener('click',()=>{if(!selectedFile||!selectedLevel||!selectedFormat||!canCompress)return;const reader=new FileReader();reader.onload=(e)=>{const img=new Image();img.onload=()=>{const result=compressImage(img,selectedLevel,selectedFormat);compressedImage.src=result.dataUrl;compressedSize.textContent=`压缩后: ${formatFileSize(result.size)} (减小${result.reduction}%)`;downloadBtn.href=result.dataUrl;downloadBtn.download=`compressed_${selectedFile.name.split('.')[0]}.${selectedFormat}`;resultSection.style.display='block';canCompress=false;compressBtn.disabled=true;timerText.style.display='block';startCountdown();};img.src=e.target.result;};reader.readAsDataURL(selectedFile);});function compressImage(img,level,format){const canvas=document.createElement('canvas');const ctx=canvas.getContext('2d');let quality=0.8;let scale=1;let blur=0;switch(level){case'light':quality=0.6;scale=0.7;break;case'medium':quality=0.4;scale=0.5;blur=2;break;case'soviet':quality=0.1;scale=0.2;blur=8;break;}canvas.width=Math.max(img.width*scale,100);canvas.height=Math.max(img.height*scale,100);ctx.drawImage(img,0,0,canvas.width,canvas.height);if(blur>0){ctx.filter=`blur(${blur}px)`;ctx.drawImage(canvas,0,0,canvas.width,canvas.height);ctx.filter='none';}let mimeType='image/jpeg';if(format==='png')mimeType='image/png';if(format==='webp')mimeType='image/webp';const dataUrl=canvas.toDataURL(mimeType,format==='png'?undefined:quality);const size=Math.round((dataUrl.length-22)*0.75);const originalSize=selectedFile.size;const reduction=Math.round((1-size/originalSize)*100);return{dataUrl,size,reduction};}function formatFileSize(bytes){if(bytes<1024)return bytes+' B';else if(bytes<1048576)return(Math.round(bytes/1024*10)/10)+' KB';else return(Math.round(bytes/1048576*10)/10)+' MB';}function startCountdown(){const countdownElement=document.getElementById('countdown');const interval=setInterval(()=>{countdown--;countdownElement.textContent=countdown;if(countdown<=0){clearInterval(interval);canCompress=true;compressBtn.disabled=false;timerText.style.display='none';countdown=60;}},1000);}
</script>
</body>
</html>
