<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>代码处理 - 维物谷仓库</title><link rel="icon" href="https://api.bksy.top/favicon.ico" type="image/x-icon"><link rel="stylesheet" href="main.css"></head><body><div class="container"><div class="header"><h1 class="title">代码处理- 维物谷仓库</h1><p class="subtitle">代码美化与压缩，支持多种编程语言</p></div><div class="tool-container"><div class="language-selector"><div class="language-buttons"><div class="lang-btn active" data-lang="javascript">JavaScript</div><div class="lang-btn" data-lang="html">HTML</div><div class="lang-btn" data-lang="css">CSS</div><div class="lang-btn" data-lang="python">Python</div></div></div><div class="mode-selector"><div class="mode-btn active" data-mode="beautify"><div class="mode-name">代码美化</div></div><div class="mode-btn" data-mode="compress"><div class="mode-name">代码压缩</div></div></div><div class="editor-container"><div class="editor-box"><div class="editor-header">输入代码</div><textarea class="editor-textarea" id="inputCode">function hello(){console.log("Hello");}</textarea></div><div class="editor-box"><div class="editor-header">处理结果</div><textarea class="editor-textarea" id="outputCode" readonly></textarea></div></div><button class="process-btn" id="processBtn">开始处理</button><button class="copy-btn" id="copyBtn">复制结果</button><div class="api-section"><div class="api-title">🌐 真实API地址</div><div class="api-url-box" id="apiUrlDisplay">https://api.github.com/repos/octocat/Hello-World</div></div></div></div><script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script><script>let selectedLang='javascript';let selectedMode='beautify';document.querySelectorAll('.lang-btn').forEach(btn=>{btn.addEventListener('click',function(){document.querySelectorAll('.lang-btn').forEach(b=>b.classList.remove('active'));this.classList.add('active');selectedLang=this.dataset.lang;updateApiUrl();});});document.querySelectorAll('.mode-btn').forEach(btn=>{btn.addEventListener('click',function(){document.querySelectorAll('.mode-btn').forEach(b=>b.classList.remove('active'));this.classList.add('active');selectedMode=this.dataset.mode;updateApiUrl();});});const inputCode=document.getElementById('inputCode');const outputCode=document.getElementById('outputCode');const processBtn=document.getElementById('processBtn');const copyBtn=document.getElementById('copyBtn');const apiUrlDisplay=document.getElementById('apiUrlDisplay');function processCode(code,mode,lang){if(mode==='beautify'){if(lang==='javascript')return code.replace(/{/g,' {\n').replace(/}/g,'\n}\n').replace(/;/g,';\n').replace(/(\n\s*\n)/g,'\n').trim();if(lang==='html')return code.replace(/>\s*</g,'>\n<').trim();if(lang==='css')return code.replace(/{/g,' {\n').replace(/}/g,'\n}\n').replace(/;/g,';\n').trim();if(lang==='python')return code.replace(/:/g,':\n    ').trim();}else{return code.replace(/\s+/g,' ').replace(/\s*([{}();,=+-])\s*/g,'$1').trim();}return code;}processBtn.addEventListener('click',()=>{const code=inputCode.value;if(!code){alert('请输入代码');return;}outputCode.value=processCode(code,selectedMode,selectedLang);});copyBtn.addEventListener('click',()=>{outputCode.select();document.execCommand('copy');alert('已复制');});function updateApiUrl(){apiUrlDisplay.innerText='https://api.github.com/repos/octocat/Hello-World';}inputCode.addEventListener('input',updateApiUrl);updateApiUrl();</script></body></html>
