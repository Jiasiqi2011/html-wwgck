<script>

'• 文件管理器支持双栏浏览、压缩解压',
'• 提供主题切换、字体大小、快捷键自定义'
];
function renderGallery() {
const track = document.getElementById('galleryTrack');
if (!track) return;
let html = '';
for (let i = 0; i < 8; i++) {
const item = galleryData[i % galleryData.length];
const index = i + 1;
html += `<div class="gallery-item">
<div class="gallery-img">
<img src="https://picsum.photos/400/700?random=${index}" alt="${item.badge}">
<div class="gallery-badge"><i class="fas ${item.icon}"></i> ${item.badge}</div>
</div>
</div>`;
}
track.innerHTML = html;
}
function renderSoftware() {
const grid = document.getElementById('softwareGrid');
if (!grid) return;
let html = '';
softwareData.forEach(item => {
html += `<div class="software-item">
<div class="software-icon"><img src="${item.icon}" alt="${item.name}"></div>
<p>${item.name}</p>
</div>`;
});
grid.innerHTML = html;
}
function renderChangelog() {
const container = document.getElementById('changelogText');
if (!container) return;
let html = '';
changelogData.forEach(item => {
html += `<p><i class="fas fa-circle" style="font-size: 8px; vertical-align: middle;"></i> ${item}</p>`;
});
container.innerHTML = html;
}
document.addEventListener('DOMContentLoaded', function() {
renderGallery();
renderSoftware();
renderChangelog();
const year = new Date().getFullYear();
document.querySelectorAll('.footer-container div:first-child').forEach(e => {
e.innerHTML = `© ${year} 部可思亿`;
