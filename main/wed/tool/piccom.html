<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>免费在线图片压缩 - 维物谷仓库</title><meta name="description" content="免费在线图片压缩工具，支持JPG、PNG、WebP格式输出，三种压缩级别可选，智能压缩图片大小，保护隐私无需上传服务器。"><meta name="keywords" content="图片压缩,在线图片压缩,JPG压缩,PNG压缩,WebP压缩,免费图片压缩,图片压缩工具,维物谷仓库"><meta name="author" content="维物谷仓库"><meta name="robots" content="index, follow"><link rel="icon" href="https://api.bksy.top/favicon.ico" type="image/x-icon"><link rel="stylesheet" href="main.css"></head><body><div class="container"><div class="header"><h1 class="title">图片压缩- 维物谷仓库</h1><p class="subtitle">支持多种格式输出</p></div><div class="tool-container"><div class="upload-area" id="uploadArea"><div class="upload-icon">📁</div><p>点击或拖拽图片</p><input type="file" id="fileInput" accept="image/*" style="display:none"></div><div class="format-options"><div class="format-btn active" data-format="jpg">JPG</div><div class="format-btn" data-format="png">PNG</div><div class="format-btn" data-format="webp">WebP</div></div><div class="compression-levels"><div class="level-btn" data-level="light"><div class="level-name">轻度</div></div><div class="level-btn active" data-level="medium"><div class="level-name">中度</div></div><div class="level-btn" data-level="soviet"><div class="level-name">高度</div></div></div><button class="process-btn" id="compressBtn" disabled>开始压缩</button><div class="result-section" id="resultSection"><div class="comparison"><div class="image-box"><img id="originalImage"><div id="originalSize"></div></div><div class="image-box"><img id="compressedImage"><div id="compressedSize"></div></div></div><a href="#" class="download-btn" id="downloadBtn">下载</a></div><div class="api-section"><div class="api-title">🌐 真实API地址</div><div class="api-url-box" id="apiUrlDisplay">https://picsum.photos/200/300</div></div></div></div><script>let selectedFile=null;let selectedLevel='medium';let selectedFormat='jpg';document.querySelectorAll('.format-btn').forEach(btn=>{btn.addEventListener('click',function(){document.querySelectorAll('.format-btn').forEach(b=>b.classList.remove('active'));this.classList.add('active');selectedFormat=this.dataset.format;updateApiUrl();});});document.querySelectorAll('.level-btn').forEach(btn=>{btn.addEventListener('click',function(){document.querySelectorAll('.level-btn').forEach(b=>b.classList.remove('active'));this.classList.add('active');selectedLevel=this.dataset.level;updateApiUrl();});});const uploadArea=document.getElementById('uploadArea');const fileInput=document.getElementById('fileInput');const compressBtn=document.getElementById('compressBtn');const resultSection=document.getElementById('resultSection');const originalImage=document.getElementById('originalImage');const compressedImage=document.getElementById('compressedImage');const downloadBtn=document.getElementById('downloadBtn');const originalSize=document.getElementById('originalSize');const compressedSize=document.getElementById('compressedSize');const apiUrlDisplay=document.getElementById('apiUrlDisplay');uploadArea.addEventListener('click',()=>fileInput.click());uploadArea.addEventListener('dragover',e=>e.preventDefault());uploadArea.addEventListener('drop',e=>{e.preventDefault();const file=e.dataTransfer.files[0];if(file&&file.type.startsWith('image/')){selectedFile=file;const reader=new FileReader();reader.onload=e=>{originalImage.src=e.target.result;originalSize.textContent=`大小: ${Math.round(file.size/1024)}KB`;uploadArea.innerHTML=`<div style="color:var(--primary)">✓ ${file.name}</div>`;updateCompressBtn();};reader.readAsDataURL(file);}});fileInput.addEventListener('change',e=>{const file=e.target.files[0];if(file){selectedFile=file;const reader=new FileReader();reader.onload=e=>{originalImage.src=e.target.result;originalSize.textContent=`大小: ${Math.round(file.size/1024)}KB`;uploadArea.innerHTML=`<div style="color:var(--primary)">✓ ${file.name}</div>`;updateCompressBtn();};reader.readAsDataURL(file);}});function updateCompressBtn(){compressBtn.disabled=!selectedFile;}updateCompressBtn();function updateApiUrl(){apiUrlDisplay.innerText='https://picsum.photos/200/300';}compressBtn.addEventListener('click',()=>{if(!selectedFile)return;const reader=new FileReader();reader.onload=e=>{const img=new Image();img.onload=()=>{let quality=0.4,scale=0.5;if(selectedLevel==='light'){quality=0.6;scale=0.7;}else if(selectedLevel==='soviet'){quality=0.1;scale=0.2;}const canvas=document.createElement('canvas');canvas.width=img.width*scale;canvas.height=img.height*scale;const ctx=canvas.getContext('2d');ctx.drawImage(img,0,0,canvas.width,canvas.height);let mime='image/jpeg';if(selectedFormat==='png')mime='image/png';if(selectedFormat==='webp')mime='image/webp';const dataUrl=canvas.toDataURL(mime,quality);compressedImage.src=dataUrl;const size=Math.round((dataUrl.length-22)*0.75);compressedSize.textContent=`压缩后: ${Math.round(size/1024)}KB`;downloadBtn.href=dataUrl;resultSection.style.display='block';};img.src=e.target.result;};reader.readAsDataURL(selectedFile);});updateApiUrl();</script></body></html>
