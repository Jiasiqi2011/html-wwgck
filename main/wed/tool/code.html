<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>代码处理 - WgH</title>
<style>
:root{--primary:#4361ee;--secondary:#f72585;--gradient:linear-gradient(135deg,var(--primary),var(--secondary));}*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif;}body{background:linear-gradient(135deg,#f5f7ff 0%,#f0f4ff 100%);min-height:100vh;padding:20px;}.container{max-width:1000px;margin:0 auto;}.header{text-align:center;margin-bottom:30px;padding:30px 0;}.title{font-size:2rem;font-weight:800;margin-bottom:10px;background:var(--gradient);-webkit-background-clip:text;background-clip:text;color:transparent;}.subtitle{color:#666;}.tool-container{background:white;border-radius:20px;padding:30px;box-shadow:0 8px 30px rgba(0,0,0,0.08);}.language-selector{margin-bottom:20px;}.language-buttons{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}.lang-btn{padding:10px;border:2px solid #e0e0e0;border-radius:8px;text-align:center;cursor:pointer;font-size:0.9rem;}.lang-btn.active{border-color:var(--primary);background:rgba(67,97,238,0.1);}.mode-selector{display:grid;grid-template-columns:1fr 1fr;gap:15px;margin-bottom:20px;}.mode-btn{padding:15px;border:2px solid #e0e0e0;border-radius:10px;text-align:center;cursor:pointer;}.mode-btn.active{border-color:var(--primary);background:rgba(67,97,238,0.1);}.mode-name{font-weight:600;margin-bottom:5px;}.mode-desc{font-size:0.8rem;color:#666;}.editor-container{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin:20px 0;}.editor-box{border:2px solid #e0e0e0;border-radius:10px;overflow:hidden;}.editor-header{background:#f8f9fa;padding:10px 15px;border-bottom:1px solid #e0e0e0;font-weight:600;}.editor-textarea{width:100%;height:300px;border:none;padding:15px;font-family:'Courier New',monospace;font-size:14px;resize:none;outline:none;}.process-btn{background:var(--gradient);color:white;border:none;padding:12px;border-radius:25px;font-weight:600;cursor:pointer;width:100%;margin:10px 0;}.process-btn:disabled{background:#ccc;cursor:not-allowed;}.timer-text{text-align:center;color:#f72585;font-weight:600;margin:10px 0;display:none;}.result-section{display:none;text-align:center;padding:20px;border:2px dashed #e0e0e0;border-radius:15px;margin-top:20px;background:#f8faff;}.copy-btn{background:#f72585;color:white;border:none;padding:10px 20px;border-radius:20px;cursor:pointer;margin-top:10px;}.tip-text{text-align:center;color:#f72585;font-size:0.9rem;margin:10px 0;font-weight:500;}
</style>
</head>
<body>
<div class="container">
<div class="header">
<h1 class="title">代码处理工具</h1>
<p class="subtitle">wghub免费代码美化与压缩，支持多种编程语言</p>
</div>
<div class="tool-container">
<div class="language-selector">
<div class="language-buttons">
<div class="lang-btn active" data-lang="javascript">JavaScript</div>
<div class="lang-btn" data-lang="html">HTML</div>
<div class="lang-btn" data-lang="css">CSS</div>
<div class="lang-btn" data-lang="python">其他</div>
</div>
</div>
<div class="tip-text">专为JavaScript和html5打造，Python、json、sql等基础支持，不支持格式敏感度较高的语言</div>
<div class="mode-selector">
<div class="mode-btn active" data-mode="beautify">
<div class="mode-name">代码美化</div>
<div class="mode-desc">格式化代码，提高可读性</div>
</div>
<div class="mode-btn" data-mode="compress">
<div class="mode-name">代码压缩</div>
<div class="mode-desc">删除空格注释，减小体积</div>
</div>
</div>
<div class="editor-container">
<div class="editor-box">
<div class="editor-header">输入代码</div>
<textarea class="editor-textarea" id="inputCode" placeholder="请输入要处理的代码...">function helloWorld(){console.log("Hello World!");}</textarea>
</div>
<div class="editor-box">
<div class="editor-header">处理结果</div>
<textarea class="editor-textarea" id="outputCode" readonly placeholder="处理结果将显示在这里..."></textarea>
</div>
</div>
<div class="timer-text" id="timerText">请等待 <span id="countdown">60</span> 秒后再次处理</div>
<button class="process-btn" id="processBtn">开始处理</button>
<div class="result-section" id="resultSection">
<button class="copy-btn" id="copyBtn">复制结果</button>
</div>
</div>
</div>
<script>
let selectedMode='beautify';let selectedLang='javascript';let canProcess=true;let countdown=60;const langButtons=document.querySelectorAll('.lang-btn');const modeButtons=document.querySelectorAll('.mode-btn');const inputCode=document.getElementById('inputCode');const outputCode=document.getElementById('outputCode');const processBtn=document.getElementById('processBtn');const copyBtn=document.getElementById('copyBtn');const resultSection=document.getElementById('resultSection');const timerText=document.getElementById('timerText');langButtons.forEach(btn=>{btn.addEventListener('click',()=>{langButtons.forEach(b=>b.classList.remove('active'));btn.classList.add('active');selectedLang=btn.dataset.lang;updatePlaceholder();});});modeButtons.forEach(btn=>{btn.addEventListener('click',()=>{modeButtons.forEach(b=>b.classList.remove('active'));btn.classList.add('active');selectedMode=btn.dataset.mode;});});function updatePlaceholder(){const examples={javascript:'function test(){console.log("hello");}',html:'<div><p>hello</p></div>',css:'body{color:red;}',python:'def hello():\n    print("hi")'};inputCode.placeholder=`请输入${selectedLang.toUpperCase()}代码...\n示例:\n${examples[selectedLang]}`;}processBtn.addEventListener('click',()=>{if(!canProcess)return;const code=inputCode.value.trim();if(!code){alert('请输入代码！');return;}const result=processCode(code,selectedMode,selectedLang);outputCode.value=result;resultSection.style.display='block';canProcess=false;processBtn.disabled=true;timerText.style.display='block';startCountdown();});copyBtn.addEventListener('click',()=>{outputCode.select();document.execCommand('copy');alert('代码已复制到剪贴板！');});function processCode(code,mode,lang){if(mode==='beautify'){return beautifyCode(code,lang);}else{return compressCode(code,lang);}}function beautifyCode(code,lang){switch(lang){case'javascript':return code.replace(/{/g,' {\n').replace(/}/g,'\n}\n').replace(/;/g,';\n').replace(/(\n\s*\n)/g,'\n').replace(/^\s+/gm,'    ').trim();case'html':return code.replace(/>\s*</g,'>\n<').replace(/(\n\s*\n)/g,'\n').replace(/^\s+/gm,'    ').trim();case'css':return code.replace(/{/g,' {\n').replace(/}/g,'\n}\n').replace(/;/g,';\n').replace(/(\n\s*\n)/g,'\n').replace(/^\s+/gm,'    ').trim();case'python':return code.replace(/:\s*/g,':\n    ').replace(/\n\s*\n/g,'\n').replace(/^\s+/gm,'    ').trim();default:return code;}}function compressCode(code,lang){switch(lang){case'javascript':return code.replace(/\/\/.*$/gm,'').replace(/\/\*[\s\S]*?\*\//g,'').replace(/\s+/g,' ').replace(/\s*([{}();,=+-])\s*/g,'$1').trim();case'html':return code.replace(/<!--[\s\S]*?-->/g,'').replace(/\s+/g,' ').replace(/>\s+</g,'><').trim();case'css':return code.replace(/\/\*[\s\S]*?\*\//g,'').replace(/\s+/g,' ').replace(/\s*([{}:;,])\s*/g,'$1').trim();case'python':return code.replace(/#.*$/gm,'').replace(/""".*?"""/gs,'').replace(/'''.*?'''/gs,'').replace(/\s+/g,' ').replace(/\s*([=+\-*/(),:])\s*/g,'$1').trim();default:return code.replace(/\s+/g,' ').trim();}}function startCountdown(){const countdownElement=document.getElementById('countdown');const interval=setInterval(()=>{countdown--;countdownElement.textContent=countdown;if(countdown<=0){clearInterval(interval);canProcess=true;processBtn.disabled=false;timerText.style.display='none';countdown=60;}},1000);}updatePlaceholder();
</script>
</body>
</html>
