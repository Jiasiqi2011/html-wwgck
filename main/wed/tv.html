<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>视频资源 - WG</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #4361ee;
            --secondary: #f72585;
            --text-dark: #2b2d42;
            --border-color: #e0e0e0;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }
        
        body {
            background-color: #f5f7ff;
            color: var(--text-dark);
            padding: 0;
        }
        
        .back-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(26, 26, 26, 0.9);
            color: white;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            z-index: 1000;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }
        
        .back-btn:hover {
            transform: translateY(-3px);
            background: linear-gradient(135deg, var(--primary), var(--secondary));
        }
        
        .video-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 80px 20px 40px;
        }
        
        .video-header {
            text-align: center;
            margin-bottom: 50px;
        }
        
        .video-title {
            font-size: 2.5rem;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 15px;
        }
        
        .video-subtitle {
            color: var(--text-dark);
            opacity: 0.8;
            font-size: 1.1rem;
        }
        
        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 30px;
            margin-bottom: 40px;
        }
        
        .video-card {
            background: white;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
        }
        
        .video-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.15);
        }
        
        .video-thumbnail {
            position: relative;
            width: 100%;
            height: 250px;
            background: #f0f0f0;
            overflow: hidden;
            cursor: pointer;
        }
        
        .video-thumbnail img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s;
        }
        
        .video-thumbnail:hover img {
            transform: scale(1.05);
        }
        
        .play-btn {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80px;
            height: 80px;
            background: rgba(0,0,0,0.8);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 2rem;
            transition: all 0.3s;
            border: none;
            cursor: pointer;
        }
        
        .play-btn:hover {
            background: var(--primary);
            transform: translate(-50%, -50%) scale(1.15);
        }
        
        .video-iframe {
            width: 100%;
            height: 300px;
            border: none;
            display: none;
            border-radius: 0;
        }
        
        .video-info {
            padding: 20px;
        }
        
        .video-name {
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 12px;
            color: var(--text-dark);
            line-height: 1.4;
        }
        
        .video-desc {
            color: #666;
            font-size: 1rem;
            line-height: 1.5;
        }
        
        .pagination {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-top: 40px;
        }
        
        .page-btn {
            padding: 10px 20px;
            border: 2px solid var(--primary);
            background: white;
            color: var(--primary);
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
            font-size: 1rem;
        }
        
        .page-btn.active {
            background: var(--primary);
            color: white;
            transform: scale(1.05);
        }
        
        .page-btn:hover:not(.active) {
            background: #f0f4ff;
            transform: translateY(-2px);
        }
        
        @media (max-width: 768px) {
            .video-container {
                padding: 70px 15px 30px;
            }
            
            .video-title {
                font-size: 2rem;
            }
            
            .video-grid {
                grid-template-columns: 1fr;
                gap: 20px;
            }
            
            .video-thumbnail {
                height: 200px;
            }
            
            .video-iframe {
                height: 250px;
            }
            
            .play-btn {
                width: 70px;
                height: 70px;
                font-size: 1.8rem;
            }
            
            .back-btn {
                top: 15px;
                left: 15px;
                width: 45px;
                height: 45px;
            }
        }
        
        @media (max-width: 480px) {
            .video-grid {
                grid-template-columns: 1fr;
            }
            
            .video-thumbnail {
                height: 180px;
            }
            
            .video-iframe {
                height: 220px;
            }
            
            .video-name {
                font-size: 1.2rem;
            }
        }
    </style>
</head>
<body>
    <!-- 返回 -->
    <a href="../index.html" class="back-btn">
        <i class="fas fa-arrow-left"></i>
    </a>
    
    <!-- 内容-->
    <div class="video-container">
        <div class="video-header">
            <h1 class="video-title">视频资源</h1>
            <p class="video-subtitle">点击播放按钮开始加载</p>
        </div>
        
        <!-- 网格 -->
        <div class="video-grid" id="videoGrid">
            <!-- 动态加载 -->
        </div>
        
        <!-- 分页-->
        <div class="pagination" id="pagination">
            <!-- 动态生成 -->
        </div>
    </div>

    <script>
        // 视频
        const videos = [
            {
                title: "逼哥的一天",
                description: "马牛逼早期视频",
                bvid: "BV1YdxfzgEav",
                thumbnail: "https://images.unsplash.com/photo-1611162617474-5b21e879e113?ixlib=rb-4.0.3&auto=format&fit=crop&w=600&q=80"
            },
            {
                title: "日行一善", 
                description: "分享美食",
                bvid: "BV1VoxfzzEEF",
                thumbnail: "https://images.unsplash.com/photo-1536240478700-b869070f9279?ixlib=rb-4.0.3&auto=format&fit=crop&w=600&q=80"
            },
            {
                title: "朝鲜新闻主持人",
                description: "朝鲜最牛主持人",
                bvid: "BV1dXxfzGExP",
                thumbnail: "https://images.unsplash.com/photo-1572947650440-e8a97ef053b2?ixlib=rb-4.0.3&auto=format&fit=crop&w=600&q=80"
            },
            {
                title: "金坷垃广告",
                description: "千年老梗",
                bvid: "BV19oxfzzEci",
                thumbnail: "https://images.unsplash.com/photo-1580554530778-ca36943938b2?ixlib=rb-4.0.3&auto=format&fit=crop&w=600&q=80"
            }
            // 可以继续添加更多视频...
        ];

        const videosPerPage = 4;
        let currentPage = 1;
        
        // 初始化
        function initPage() {
            renderVideos();
            renderPagination();
        }
        
        // 渲染
        function renderVideos() {
            const videoGrid = document.getElementById('videoGrid');
            videoGrid.innerHTML = '';
            
            const startIndex = (currentPage - 1) * videosPerPage;
            const endIndex = startIndex + videosPerPage;
            const currentVideos = videos.slice(startIndex, endIndex);
            
            currentVideos.forEach(video => {
                const videoCard = createVideoCard(video);
                videoGrid.appendChild(videoCard);
            });
        }
        
        // 创建
        function createVideoCard(video) {
            const card = document.createElement('div');
            card.className = 'video-card';
            card.innerHTML = `
                <div class="video-thumbnail">
                    <img src="${video.thumbnail}" alt="${video.title}" loading="lazy">
                    <button class="play-btn" onclick="loadVideo(this, '${video.bvid}')">
                        <i class="fas fa-play"></i>
                    </button>
                    <iframe class="video-iframe" 
                            src=""
                            data-bvid="${video.bvid}"
                            scrolling="no"
                            border="0"
                            frameborder="no" 
                            framespacing="0"
                            allowfullscreen="true">
                    </iframe>
                </div>
                <div class="video-info">
                    <h3 class="video-name">${video.title}</h3>
                    <p class="video-desc">${video.description}</p>
                </div>
            `;
            return card;
        }
        
        // 加载视频（点击播放按钮时）
        function loadVideo(playBtn, bvid) {
            const thumbnail = playBtn.parentElement;
            const iframe = thumbnail.querySelector('.video-iframe');
            const img = thumbnail.querySelector('img');
            
            // 隐藏缩略图和播放按钮
            img.style.display = 'none';
            playBtn.style.display = 'none';
            
            // 显示并加载iframe
            iframe.style.display = 'block';
            iframe.src = `https://player.bilibili.com/player.html?bvid=${bvid}&page=1&high_quality=1&autoplay=1`;
        }
        
        // 渲染分页按钮
        function renderPagination() {
            const pagination = document.getElementById('pagination');
            pagination.innerHTML = '';
            
            const totalPages = Math.ceil(videos.length / videosPerPage);
            
            for (let i = 1; i <= totalPages; i++) {
                const pageBtn = document.createElement('button');
                pageBtn.className = `page-btn ${i === currentPage ? 'active' : ''}`;
                pageBtn.textContent = i;
                pageBtn.onclick = () => changePage(i);
                pagination.appendChild(pageBtn);
            }
        }
        
        // 切换页面
        function changePage(page) {
            currentPage = page;
            renderVideos();
            renderPagination();
        }
        
        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', initPage);
    </script>
</body>
</html>
