<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><link rel="icon" href="https://api.bksy.top/favicon.ico" type="image/x-icon"><meta name="viewport" content="width=device-width,initial-scale=1"><title>API测试 - 维物谷仓库</title><link rel="stylesheet" href="main.css"></head><body><div class="container"><div class="header"><h1 class="title">API测试- 维物谷仓库</h1><p class="subtitle">免费API接口调试工具</p></div><div class="tool-container"><div class="request-panel"><div class="input-row"><label>请求方法</label><select class="method-select" id="methodSelect"><option value="GET">GET</option><option value="POST">POST</option><option value="PUT">PUT</option><option value="DELETE">DELETE</option><option value="PATCH">PATCH</option></select></div><div class="input-row"><label>请求URL</label><input type="url" class="url-input" id="urlInput" placeholder="https://api.example.com/data"></div><div class="input-group"><label>请求头</label><div class="header-row"><input type="text" class="header-input" id="headerKey" placeholder="Header名称"><input type="text" class="header-input" id="headerValue" placeholder="Header值"><button class="small-btn" id="addHeaderBtn">添加</button></div><div id="headersContainer"></div></div><div class="input-group" id="bodyGroup"><label>请求体</label><textarea class="body-input" id="bodyInput" placeholder='{"key": "value"}'></textarea></div><div class="api-presets"><button class="small-btn" data-preset="jsonplaceholder">JSONPlaceholder API</button><button class="small-btn" data-preset="github">GitHub API</button><button class="small-btn" data-preset="weather">天气API</button><button class="small-btn" data-preset="clear">清空所有</button></div><div class="button-group"><button class="send-btn" id="sendBtn">发送请求</button><button class="send-btn" id="resetBtn" style="background:#6c757d;">重置</button></div></div><div class="response-panel"><div class="response-header"><span>响应结果</span><button class="copy-btn" id="copyResponseBtn">复制响应</button></div><div class="response-content" id="responseContent"><div style="color:#666;text-align:center;padding:40px;">输出……</div></div></div><div class="api-section"><div class="api-title">🌐 真实API地址</div><div class="api-url-box" id="apiUrlDisplay">https://jsonplaceholder.typicode.com/posts/1</div></div></div><div class="footer"><a href="https://hub.j47v.top" target="_blank">https://hub.j47v.top</a></div></div><script>const methodSelect=document.getElementById('methodSelect');const urlInput=document.getElementById('urlInput');const bodyInput=document.getElementById('bodyInput');const bodyGroup=document.getElementById('bodyGroup');const headerKey=document.getElementById('headerKey');const headerValue=document.getElementById('headerValue');const addHeaderBtn=document.getElementById('addHeaderBtn');const headersContainer=document.getElementById('headersContainer');const sendBtn=document.getElementById('sendBtn');const resetBtn=document.getElementById('resetBtn');const copyResponseBtn=document.getElementById('copyResponseBtn');const responseContent=document.getElementById('responseContent');const apiUrlDisplay=document.getElementById('apiUrlDisplay');let headers={};let startTime=0;methodSelect.addEventListener('change',()=>{const method=methodSelect.value;bodyGroup.style.display=method==='GET'?'none':'block';});addHeaderBtn.addEventListener('click',()=>{const key=headerKey.value.trim();const value=headerValue.value.trim();if(key&&value){headers[key]=value;updateHeadersDisplay();headerKey.value='';headerValue.value='';}});document.querySelectorAll('.api-presets .small-btn').forEach(btn=>{btn.addEventListener('click',(e)=>{const preset=e.target.dataset.preset;loadPreset(preset);});});sendBtn.addEventListener('click',async()=>{const url=urlInput.value.trim();const method=methodSelect.value;if(!url){alert('请输入请求URL！');return;}sendBtn.disabled=true;sendBtn.textContent='请求中...';startTime=Date.now();try{const options={method,headers:{'Content-Type':'application/json',...headers},mode:'cors'};if(method!=='GET'&&bodyInput.value.trim()){try{JSON.parse(bodyInput.value.trim());options.body=bodyInput.value.trim();}catch(e){alert('请求体必须是有效的JSON格式！');return;}}const response=await fetch(url,options);const contentType=response.headers.get('content-type');let data;if(contentType&&contentType.includes('application/json')){data=await response.json();}else{data=await response.text();}displayResponse(response,data);}catch(error){displayError(error);}finally{sendBtn.disabled=false;sendBtn.textContent='发送请求';}});resetBtn.addEventListener('click',()=>{urlInput.value='';bodyInput.value='';headers={};updateHeadersDisplay();responseContent.innerHTML='<div style="color:#666;text-align:center;padding:40px;">输出……</div>';});copyResponseBtn.addEventListener('click',()=>{const text=responseContent.innerText;navigator.clipboard.writeText(text).then(()=>{alert('响应内容已复制！');});});function updateHeadersDisplay(){headersContainer.innerHTML=Object.entries(headers).map(([key,value])=>`<div class="header-row"><input type="text" class="header-input" value="${key}" readonly><input type="text" class="header-input" value="${value}" readonly><button class="small-btn" onclick="removeHeader('${key}')">删除</button></div>`).join('');}function removeHeader(key){delete headers[key];updateHeadersDisplay();}function loadPreset(preset){switch(preset){case'jsonplaceholder':urlInput.value='https://jsonplaceholder.typicode.com/posts/1';methodSelect.value='GET';headers={};apiUrlDisplay.innerText='https://jsonplaceholder.typicode.com/posts/1';break;case'github':urlInput.value='https://api.github.com/users/octocat';methodSelect.value='GET';headers={'User-Agent':'WgHub-API-Tool'};apiUrlDisplay.innerText='https://api.github.com/users/octocat';break;case'weather':urlInput.value='https://api.weatherapi.com/v1/current.json?key=YOUR_KEY&q=Beijing';methodSelect.value='GET';headers={};apiUrlDisplay.innerText='https://api.weatherapi.com/v1/current.json?key=YOUR_KEY&q=Beijing';break;case'clear':urlInput.value='';bodyInput.value='';headers={};apiUrlDisplay.innerText='https://jsonplaceholder.typicode.com/posts/1';break;}updateHeadersDisplay();methodSelect.dispatchEvent(new Event('change'));}function displayResponse(response,data){const endTime=Date.now();const duration=endTime-startTime;const statusClass=response.ok?'success':'error';const dataSize=typeof data==='string'?data.length:JSON.stringify(data).length;responseContent.innerHTML=`<div style="margin-bottom:15px;"><span class="status ${statusClass}">${response.status} ${response.statusText}</span><span class="time-info">耗时: ${duration}毫秒</span><span class="time-info">大小: ${formatSize(dataSize)}</span></div><pre>${typeof data==='string'?data:JSON.stringify(data,null,2)}</pre>`;}function displayError(error){const endTime=Date.now();const duration=endTime-startTime;responseContent.innerHTML=`<div style="margin-bottom:15px;"><span class="status error">请求失败</span><span class="time-info">耗时: ${duration}毫秒</span></div><div style="color:#f72585;">${error.message}</div><div style="margin-top:10px;color:#666;font-size:12px;">提示：请检查URL格式、网络连接或CORS策略</div>`;}function formatSize(bytes){if(bytes<1024)return bytes+' B';else if(bytes<1048576)return(bytes/1024).toFixed(1)+' KB';else return(bytes/1048576).toFixed(1)+' MB';}methodSelect.dispatchEvent(new Event('change'));</script></body></html>
