<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>代码 - WGH</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary: #4361ee;
            --secondary: #f72585;
            --dark-bg: #1a1a1a;
            --content-bg: #ffffff;
            --text-dark: #2b2d42;
            --text-light: #f8f9fa;
            --border-color: #e0e0e0;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }
        
        body {
            background-color: #f5f7ff;
            color: var(--text-dark);
            line-height: 1.6;
            padding: 0;
        }
        
        .text-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        
        .text-header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .text-title {
            font-size: 2.5rem;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 15px;
        }
        
        .text-subtitle {
            color: var(--text-dark);
            opacity: 0.8;
            font-size: 1.1rem;
        }
        
        .text-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 30px;
            margin-top: 40px;
        }
        
        .text-card {
            background: white;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            transition: all 0.3s ease;
            padding: 20px;
            position: relative;
        }
        
        .text-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.15);
        }
        
        .text-icon-container {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .text-icon {
            width: 80px;
            height: 80px;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            margin-right: 15px;
            flex-shrink: 0;
        }
        
        .text-info {
            flex: 1;
        }
        
        .text-name {
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 8px;
        }
        
        .text-type {
            color: var(--secondary);
            font-weight: 500;
            margin-bottom: 8px;
            display: inline-block;
            padding: 4px 12px;
            background: rgba(247, 37, 133, 0.1);
            border-radius: 50px;
            font-size: 0.9rem;
        }
        
        .text-desc {
            color: var(--text-dark);
            opacity: 0.7;
            margin-bottom: 15px;
            font-size: 0.95rem;
        }
        
        .text-meta {
            color: #999;
            font-size: 0.9rem;
            margin-bottom: 5px;
        }
        
        .text-controls {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            flex-wrap: wrap;
        }
        
        .download-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s;
            border: none;
            cursor: pointer;
            font-size: 0.9rem;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            flex: 1;
            justify-content: center;
        }
        
        .download-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(67, 97, 238, 0.4);
        }
        
        .upload-container {
            text-align: center;
            margin: 50px 0 30px;
        }
        
        .upload-btn {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            width: 70px;
            height: 70px;
            border-radius: 50%;
            font-size: 2rem;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 5px 15px rgba(67, 97, 238, 0.3);
        }
        
        .upload-btn:hover:not(:disabled) {
            transform: translateY(-3px) scale(1.05);
        }
        
        .upload-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .timer-display {
            margin-top: 15px;
            font-size: 1.2rem;
            color: var(--text-dark);
        }
        
        .upload-message {
            margin-top: 10px;
            padding: 10px;
            border-radius: 8px;
            font-weight: 500;
        }
        
        .upload-success {
            background: rgba(6, 214, 160, 0.1);
            color: #06d6a0;
        }
        
        .upload-error {
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
        }
        
        .upload-form {
            display: none;
            margin-top: 20px;
            background: white;
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            max-width: 400px;
            margin-left: auto;
            margin-right: auto;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
        }
        
        .file-input input, .description-input, .file-type-select {
            width: 100%;
            padding: 12px;
            border: 2px solid var(--border-color);
            border-radius: 8px;
            font-size: 1rem;
        }
        
        .file-input input:focus, .description-input:focus, .file-type-select:focus {
            outline: none;
            border-color: var(--primary);
        }
        
        .description-hint {
            color: #666;
            font-size: 0.9rem;
            margin-top: 5px;
        }
        
        .form-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }
        
        .submit-btn, .cancel-btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.3s;
        }
        
        .submit-btn {
            background: var(--primary);
            color: white;
        }
        
        .submit-btn:hover {
            background: #3a56d4;
        }
        
        .cancel-btn {
            background: #e5e7eb;
            color: var(--text-dark);
        }
        
        .loading {
            text-align: center;
            padding: 20px;
            color: #666;
        }
        
        .no-texts {
            text-align: center;
            padding: 40px;
            color: #666;
            font-size: 1.1rem;
        }
        
        @media (max-width: 768px) {
            .text-container {
                padding: 30px 15px;
            }
            
            .text-grid {
                grid-template-columns: 1fr;
                gap: 20px;
            }
            
            .text-icon-container {
                flex-direction: column;
                text-align: center;
            }
            
            .text-icon {
                margin-right: 0;
                margin-bottom: 15px;
            }
        }
    </style>
</head>
<body>
    
    <div class="text-container">
        <div class="text-header">
            <h1 class="text-title">代码作品</h1>
            <p class="text-subtitle">您上传的文件将公开，遵循 CC-BY 4.0 协议，不得上传危险文件，安全起见请您手动选择后缀名！</p>
        </div>
        
        <div class="upload-container">
            <button class="upload-btn" id="uploadBtn">
                <i class="fas fa-plus"></i>
            </button>
            <div class="timer-display" id="timerDisplay">可以上传</div>
            <div id="messageContainer"></div>
            
            <form class="upload-form" id="uploadForm">
                <div class="form-group file-input">
                    <label class="form-label">选择文件</label>
                    <input type="file" name="textFile" required>
                    <p class="description-hint">支持任何文件类型 (最大2MB)</p>
                </div>
                
                <div class="form-group">
                    <label class="form-label">文件类型</label>
                    <select name="file_type" class="file-type-select" required>
                        <option value="">请选择文件类型</option>
                        <option value="zip">压缩文件 (.zip)</option>
                        <option value="html">HTML文件 (.html)</option>
                        <option value="php">PHP文件 (.php)</option>
                        <option value="js">JavaScript文件 (.js)</option>
                        <option value="py">Python文件 (.py)</option>
                        <option value="cpp">C++文件 (.cpp)</option>
                        <option value="txt">文本文件 (.txt)</option>
                        <option value="other">其他文件</option>
                    </select>
                    <p class="description-hint">请选择正确的文件类型以确保下载时后缀名正确</p>
                </div>
                
                <div class="form-group">
                    <label class="form-label">文件描述</label>
                    <input type="text" name="text_description" class="description-input" placeholder="描述（20字内）" maxlength="20">
                    <p class="description-hint">最多20字，不超过2MB</p>
                </div>
                
                <div class="form-actions">
                    <button type="button" class="cancel-btn" id="cancelUpload">取消</button>
                    <button type="submit" class="submit-btn">上传</button>
                </div>
            </form>
        </div>
        
        <div class="text-grid" id="textGrid"></div>
    </div>

    <script>
const SUPABASE_URL = 'https://whtkkvuwbxccmqybiykz.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndodGtrdnV3YnhjY21xeWJpeWt6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTk3MDYzNjIsImV4cCI6MjA3NTI4MjM2Mn0.XWkl5r7vLAJiAXEzUDE71WG_HFhAYXRRSkufH--svg8';

const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
const STORAGE_BUCKET = 'text-files';

let uploadedTexts = [];

// 生成 名
function generateUniqueFileName(originalName, fileType) {
    const timestamp = Date.now();
    const randomStr = Math.random().toString(36).substring(2, 8);
    return `${timestamp}_${randomStr}.${fileType}`;
}

document.addEventListener('DOMContentLoaded', function() {
    initializeApp();
});

function initializeApp() {
    loadTexts();
    setupEventListeners();
}

function setupEventListeners() {
    const uploadBtn = document.getElementById('uploadBtn');
    const cancelBtn = document.getElementById('cancelUpload');
    const uploadForm = document.getElementById('uploadForm');
    
    uploadBtn.addEventListener('click', function() {
        uploadForm.style.display = 'block';
    });
    
    cancelBtn.addEventListener('click', function() {
        uploadForm.style.display = 'none';
        resetForm();
    });
    
    uploadForm.addEventListener('submit', function(event) {
        handleFileUpload(event);
    });
}

async function loadTexts() {
    try {
        const { data, error } = await supabaseClient
            .from('text_files')
            .select('*')
            .order('upload_time', { ascending: false });
        
        if (error) throw error;
        uploadedTexts = data || [];
        renderTexts();
    } catch (error) {
        console.error('加载失败:', error);
    }
}

function renderTexts() {
    const container = document.getElementById('textGrid');
    container.innerHTML = '';
    
    if (uploadedTexts.length === 0) {
        container.innerHTML = '<div class="loading">暂无文件</div>';
        return;
    }
    
    container.innerHTML = uploadedTexts.map(text => {
        const uploadDate = new Date(text.upload_time).toLocaleDateString('zh-CN');
        const fileSizeKB = (text.file_size / 1024).toFixed(2) + ' KB';
        const description = text.text_description || `大小: ${fileSizeKB}`;
        
        return `
            <div class="text-card">
                <div class="text-icon-container">
                    <div class="text-icon">
                        <i class="fas fa-file-text"></i>
                    </div>
                    <div class="text-info">
                        <h3 class="text-name">${text.original_name}</h3>
                        <span class="text-type">${getFileType(text.filename)}</span>
                        <p class="text-desc">${description}</p>
                        <p class="text-meta">上传: ${uploadDate}</p>
                        <p class="text-meta">大小: ${fileSizeKB}</p>
                    </div>
                </div>
                <div class="text-controls">
                    <button class="download-btn" onclick="downloadText('${text.id}')">
                        <i class="fas fa-download"></i> 下载
                    </button>
                </div>
            </div>
        `;
    }).join('');
}

// 类型显示
function getFileType(filename) {
    const ext = filename.split('.').pop().toUpperCase();
    return ext;
}

async function handleFileUpload(event) {
    event.preventDefault();
    
    const formData = new FormData(event.target);
    const file = formData.get('textFile');
    const fileType = formData.get('file_type');
    const description = formData.get('text_description') || '';
    
    if (!file) {
        alert('请选择文件');
        return;
    }
    
    if (!fileType) {
        alert('请选择文件类型');
        return;
    }
    
    if (file.size > 2 * 1024 * 1024) {
        alert('文件太大，最大支持2MB');
        return;
    }
    
    try {
        // 唯一
        const fileName = generateUniqueFileName(file.name, fileType);
        
        const { data: storageData, error: storageError } = await supabaseClient
            .storage
            .from(STORAGE_BUCKET)
            .upload(fileName, file);
        
        if (storageError) throw storageError;
        
        const { error: dbError } = await supabaseClient
            .from('text_files')
            .insert({
                filename: fileName,
                original_name: file.name,
                file_size: file.size,
                text_description: description,
                storage_path: storageData.path
            });
        
        if (dbError) throw dbError;
        
        alert('上传成功！');
        resetForm();
        document.getElementById('uploadForm').style.display = 'none';
        await loadTexts();
        
    } catch (error) {
        console.error('上传错误:', error);
        alert('上传失败: ' + error.message);
    }
}

window.downloadText = async function(textId) {
    try {
        const { data: fileInfo, error: infoError } = await supabaseClient
            .from('text_files')
            .select('filename, original_name, storage_path')
            .eq('id', textId)
            .single();
        
        if (infoError) throw infoError;
        
        const { data: fileData, error: downloadError } = await supabaseClient
            .storage
            .from(STORAGE_BUCKET)
            .download(fileInfo.storage_path || fileInfo.filename);
        
        if (downloadError) throw downloadError;
        
        const url = URL.createObjectURL(fileData);
        const a = document.createElement('a');
        a.href = url;
        
        // 后缀
        const fileExt = fileInfo.filename.split('.').pop();
        a.download = `download.${fileExt}`;
        
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        
        setTimeout(() => URL.revokeObjectURL(url), 100);
        
    } catch (error) {
        console.error('下载错误:', error);
        alert('下载失败');
    }
}

function resetForm() {
    document.getElementById('uploadForm').reset();
}
</script>
</body>
</html>
