<!DOCTYPE html><html lang="zh-CN"><head><link rel="icon" href="https://api.bksy.top/favicon.ico" type="image/x-icon"><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Base64转换 - 维物谷仓库</title><link rel="stylesheet" href="main.css"></head><body><div class="container"><div class="header"><h1 class="title">Base64转换- 维物谷仓库</h1><p class="subtitle">支持文本和文件</p></div><div class="tool-container"><div class="mode-selector"><div class="mode-btn active" data-mode="encode"><div class="mode-name">Base64编码</div></div><div class="mode-btn" data-mode="decode"><div class="mode-name">Base64解码</div></div></div><div class="editor-container"><div class="editor-box"><div class="editor-header">文本输入</div><textarea class="editor-textarea" id="inputText" placeholder="请输入要编码的文本或粘贴Base64字符串...">Hello WgHub!</textarea></div><div class="editor-box"><div class="editor-header">转换结果</div><textarea class="editor-textarea" id="outputText" readonly placeholder="输出..."></textarea></div></div><button class="process-btn" id="processBtn">开始转换</button><div style="text-align:center;"><button class="copy-btn" id="copyBtn">复制</button><button class="copy-btn" id="clearBtn">清空</button></div><div class="api-section"><div class="api-title">🌐 真实API地址</div><div class="api-url-box" id="apiUrlDisplay">https://api.github.com/repos/octocat/Hello-World</div></div></div></div><script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script><script>let selectedMode='encode';document.querySelectorAll('.mode-btn').forEach(btn=>{btn.addEventListener('click',function(){document.querySelectorAll('.mode-btn').forEach(b=>b.classList.remove('active'));this.classList.add('active');selectedMode=this.dataset.mode;updateApiUrl();});});const inputText=document.getElementById('inputText');const outputText=document.getElementById('outputText');const processBtn=document.getElementById('processBtn');const copyBtn=document.getElementById('copyBtn');const clearBtn=document.getElementById('clearBtn');const apiUrlDisplay=document.getElementById('apiUrlDisplay');processBtn.addEventListener('click',()=>{const input=inputText.value.trim();if(!input){alert('请输入内容');return;}try{if(selectedMode==='encode'){outputText.value=btoa(unescape(encodeURIComponent(input)));}else{try{outputText.value=decodeURIComponent(escape(atob(input)));}catch{outputText.value='无效的Base64字符串';}}}catch(error){alert('转换失败：'+error.message);}});copyBtn.addEventListener('click',()=>{outputText.select();document.execCommand('copy');alert('已复制');});clearBtn.addEventListener('click',()=>{inputText.value='';outputText.value='';});function updateApiUrl(){apiUrlDisplay.innerText='https://api.github.com/repos/octocat/Hello-World';}inputText.addEventListener('input',updateApiUrl);updateApiUrl();</script></body></html>
