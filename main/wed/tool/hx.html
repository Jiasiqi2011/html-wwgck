<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>强效哈希密码生成器 | 安全密码生成工具 - 维物谷仓库</title><meta name="description" content="强效哈希密码生成器，支持SHA-256、SHA-512、MD5哈希加密，可自定义密码长度，生成高强度安全密码，纯前端处理，不上传服务器。"><meta name="keywords" content="密码生成器,强密码,哈希密码,SHA256,SHA512,MD5加密,安全密码,随机密码,维物谷仓库"><meta name="author" content="维物谷仓库"><meta name="robots" content="index, follow"><link rel="icon" href="https://api.bksy.top/favicon.ico" type="image/x-icon"><link rel="stylesheet" href="main.css"><script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script></head><body><div class="container"><div class="header"><h1 class="title">强效哈希密码生成器</h1><p class="subtitle">高强度密码生成 + SHA-256/SHA-512/MD5 哈希加密</p></div><div class="tool-container"><div class="options-grid"><div class="input-group"><label>密码长度: <span id="lengthValue">16</span></label><input type="range" id="pwdLength" min="8" max="64" value="16" style="width:100%"></div><div class="input-group"><label>哈希算法</label><div class="format-options" style="grid-template-columns:repeat(3,1fr);margin:0"><div class="format-btn active" data-hash="sha256">SHA-256</div><div class="format-btn" data-hash="sha512">SHA-512</div><div class="format-btn" data-hash="md5">MD5</div></div></div></div><button class="process-btn" id="generateBtn">生成强密码</button><div class="editor-container"><div class="editor-box"><div class="editor-header">原始密码</div><textarea class="editor-textarea" id="passwordOutput" readonly style="font-family:monospace"></textarea></div><div class="editor-box"><div class="editor-header">哈希值</div><textarea class="editor-textarea" id="hashOutput" readonly style="font-family:monospace"></textarea></div></div><div style="display:flex;gap:10px;justify-content:center;margin-top:10px"><button class="copy-btn" id="copyPwdBtn">复制密码</button><button class="copy-btn" id="copyHashBtn">复制哈希</button></div></div></div><script>const lengthSlider=document.getElementById('pwdLength');const lengthValue=document.getElementById('lengthValue');const generateBtn=document.getElementById('generateBtn');const passwordOutput=document.getElementById('passwordOutput');const hashOutput=document.getElementById('hashOutput');const copyPwdBtn=document.getElementById('copyPwdBtn');const copyHashBtn=document.getElementById('copyHashBtn');let selectedHash='sha256';document.querySelectorAll('.format-btn').forEach(btn=>{btn.addEventListener('click',function(){document.querySelectorAll('.format-btn').forEach(b=>b.classList.remove('active'));this.classList.add('active');selectedHash=this.dataset.hash;});});lengthSlider.addEventListener('input',function(){lengthValue.textContent=this.value;});function generatePassword(){const length=parseInt(lengthSlider.value);const upper='ABCDEFGHJKLMNPQRSTUVWXYZ';const lower='abcdefghijkmnopqrstuvwxyz';const numbers='23456789';const symbols='!@#$%^&*';const chars=upper+lower+numbers+symbols;let password='';for(let i=0;i<length;i++){password+=chars.charAt(Math.floor(Math.random()*chars.length));}return password;}function generateHash(password){if(selectedHash==='sha256') return CryptoJS.SHA256(password).toString();if(selectedHash==='sha512') return CryptoJS.SHA512(password).toString();if(selectedHash==='md5') return CryptoJS.MD5(password).toString();return password;}function updateOutput(){const password=generatePassword();passwordOutput.value=password;hashOutput.value=generateHash(password);}generateBtn.addEventListener('click',updateOutput);copyPwdBtn.addEventListener('click',()=>{passwordOutput.select();document.execCommand('copy');alert('密码已复制');});copyHashBtn.addEventListener('click',()=>{hashOutput.select();document.execCommand('copy');alert('哈希值已复制');});updateOutput();</script></body></html>
