<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WG - 软件中心</title>
  <style>
    /* === 全局样式 === */
    :root {
      --primary: #4361ee;
      --secondary: #f72585;
      --light-bg: #f8f9fa;
      --card-bg: #ffffff;
      --text-dark: #2b2d42;
      --border-color: #e0e0e0;
      --shadow: 0 10px 30px rgba(0,0,0,0.1);
      --success: #4caf50;
      --warning: #ff9800;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', -apple-system, sans-serif;
    }

    body {
      background-color: var(--light-bg);
      color: var(--text-dark);
      line-height: 1.6;
    }

    /* === 导航栏 === */
    .navbar {
      background: rgba(26, 26, 26, 0.9);
      color: white;
      padding: 15px 5%;
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    .nav-container {
      display: flex;
      justify-content: space-between;
      align-items: center;
      max-width: 1200px;
      margin: 0 auto;
    }

    .nav-left {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .back-btn {
      color: white;
      font-size: 1.2rem;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s;
      text-decoration: none;
    }

    .back-btn:hover {
      background: rgba(255,255,255,0.2);
      transform: translateX(-3px);
    }

    .logo {
      font-size: 1.5rem;
      font-weight: 700;
      color: white;
      text-decoration: none;
    }

    /* === 分类筛选 === */
    .category-filter {
      max-width: 1200px;
      margin: 20px auto;
      padding: 0 20px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .filter-btn {
      padding: 8px 16px;
      border-radius: 50px;
      border: 1px solid var(--border-color);
      background: white;
      cursor: pointer;
      transition: all 0.3s;
    }

    .filter-btn:hover, .filter-btn.active {
      background: var(--primary);
      color: white;
      border-color: var(--primary);
    }

    /* === 软件下载中心 === */
    .download-center {
      max-width: 1200px;
      margin: 20px auto 40px;
      padding: 0 20px;
    }

    .page-header {
      text-align: center;
      margin-bottom: 40px;
    }

    .page-title {
      font-size: 2.5rem;
      margin-bottom: 15px;
      background: linear-gradient(90deg, var(--primary), var(--secondary));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .page-subtitle {
      color: var(--text-dark);
      opacity: 0.8;
      font-size: 1.1rem;
    }

    .software-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
      gap: 30px;
    }

    /* === 软件卡片 === */
    .software-card {
      background: var(--card-bg);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: var(--shadow);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      border: 1px solid var(--border-color);
    }

    .software-card:hover {
      transform: translateY(-10px);
      box-shadow: 0 15px 40px rgba(0,0,0,0.15);
    }

    .software-header {
      position: relative;
      height: 200px;
      overflow: hidden;
      margin-bottom: 30px;
    }

    .software-image {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.5s;
    }

    .software-card:hover .software-image {
      transform: scale(1.05);
    }

    /* === 软件图标 === */
    .software-icon {
      position: absolute;
      bottom: -25px;
      left: 25px;
      width: 80px;
      height: 80px;
      border-radius: 12px;
      border: 3px solid var(--card-bg);
      box-shadow: 0 5px 15px rgba(0,0,0,0.2);
      object-fit: cover;
      z-index: 2;
      background: #f0f0f0;
    }

    .software-badge {
      position: absolute;
      top: 15px;
      right: 15px;
      background: var(--secondary);
      color: white;
      padding: 5px 10px;
      border-radius: 50px;
      font-size: 0.8rem;
      font-weight: 500;
    }

    .software-body {
      padding: 25px;
    }

    .software-title {
      font-size: 1.5rem;
      margin-bottom: 10px;
      color: var(--text-dark);
    }

    .software-meta {
      display: flex;
      gap: 15px;
      margin-bottom: 15px;
      color: var(--text-dark);
      opacity: 0.8;
      font-size: 0.9rem;
    }

    .software-desc {
      margin-bottom: 20px;
      line-height: 1.6;
      color: var(--text-dark);
      opacity: 0.9;
    }

    .download-section {
      display: flex;
      gap: 10px;
    }

    .download-btn {
      flex: 1;
      padding: 12px;
      border-radius: 8px;
      border: none;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      position: relative;
      overflow: hidden;
    }

    .windows-btn {
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: white;
    }

    .android-btn {
      background: #3ddc84;
      color: white;
    }

    .download-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    }

    .download-btn:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    /* 下载进度条 */
    .progress-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      height: 3px;
      background: rgba(255,255,255,0.5);
      width: 0%;
      transition: width 0.3s ease;
    }

    /* 软件截图区域 */
    .screenshots {
      display: flex;
      gap: 10px;
      margin-top: 15px;
      overflow-x: auto;
      padding-bottom: 10px;
    }

    .screenshot {
      width: 100px;
      height: 60px;
      border-radius: 8px;
      object-fit: cover;
      cursor: pointer;
      transition: transform 0.3s;
      border: 1px solid var(--border-color);
    }

    .screenshot:hover {
      transform: scale(1.05);
    }

    /* 模态框 */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.8);
      z-index: 1000;
      justify-content: center;
      align-items: center;
    }

    .modal-content {
      max-width: 90%;
      max-height: 90%;
      border-radius: 12px;
      overflow: hidden;
    }

    .modal-img {
      width: 100%;
      height: auto;
    }

    .close-modal {
      position: absolute;
      top: 20px;
      right: 20px;
      color: white;
      font-size: 2rem;
      cursor: pointer;
      background: rgba(0,0,0,0.5);
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* 下载完成提示 */
    .download-complete {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: var(--success);
      color: white;
      padding: 15px 20px;
      border-radius: 8px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.2);
      display: none;
      z-index: 1000;
      animation: slideIn 0.3s ease;
    }

    @keyframes slideIn {
      from { transform: translateX(100px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }

    /* === 响应式设计 === */
    @media (max-width: 768px) {
      .software-grid {
        grid-template-columns: 1fr;
      }
      
      .page-title {
        font-size: 2rem;
      }

      .download-section {
        flex-direction: column;
      }

      .category-filter {
        justify-content: center;
      }
    }
  </style>

  </div>

  <script>
    // 分类筛选功能
    document.querySelectorAll('.filter-btn').forEach(button => {
      button.addEventListener('click', () => {
        // 移除所有active类
        document.querySelectorAll('.filter-btn').forEach(btn => {
          btn.classList.remove('active');
        });
        
        // 添加active类到当前按钮
        button.classList.add('active');
        
        const filter = button.getAttribute('data-filter');
        
        // 显示/隐藏软件卡片
        document.querySelectorAll('.software-card').forEach(card => {
          if (filter === 'all') {
            card.style.display = 'block';
          } else {
            const categories = card.getAttribute('data-category').split(' ');
            if (categories.includes(filter)) {
              card.style.display = 'block';
            } else {
              card.style.display = 'none';
            }
          }
        });
      });
    });

    // 截图预览功能
    const modal = document.getElementById('screenshotModal');
    const modalImage = document.getElementById('modalImage');
    const closeModal = document.querySelector('.close-modal');
    
    document.querySelectorAll('.screenshot').forEach(screenshot => {
      screenshot.addEventListener('click', () => {
        modal.style.display = 'flex';
        modalImage.src = screenshot.src;
      });
    });
    
    closeModal.addEventListener('click', () => {
      modal.style.display = 'none';
    });
    
    modal.addEventListener('click', (e) => {
      if (e.target === modal) {
        modal.style.display = 'none';
      }
    });

    // 下载功能
    document.querySelectorAll('.download-btn').forEach(button => {
      button.addEventListener('click', function() {
        const fileName = this.getAttribute('data-file');
        const progressBar = this.querySelector('.progress-bar');
        const buttonText = this.querySelector('span');
        const originalText = this.innerHTML;
        
        // 禁用按钮
        this.disabled = true;
        
        // 模拟下载进度
        let progress = 0;
        const interval = setInterval(() => {
          progress += Math.random() * 15;
          if (progress >= 100) {
            progress = 100;
            clearInterval(interval);
            
            // 下载完成
            progressBar.style.width = '100%';
            
            // 显示完成提示
            const completeToast = document.getElementById('downloadComplete');
            completeToast.style.display = 'block';
            completeToast.querySelector('span').textContent = `${fileName} 下载完成！`;
            
            // 3秒后隐藏提示
            setTimeout(() => {
              completeToast.style.display = 'none';
            }, 3000);
            
            // 恢复按钮状态
            setTimeout(() => {
              this.disabled = false;
              progressBar.style.width = '0%';
              this.innerHTML = originalText;
            }, 2000);
          } else {
            progressBar.style.width = `${progress}%`;
          }
        }, 100);
      });
    });
  </script>
