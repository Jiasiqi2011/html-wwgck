
[[headers]]
  for = "/images/*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/images/*.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# 其他资源缓存
[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=3153600"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=3153600"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
