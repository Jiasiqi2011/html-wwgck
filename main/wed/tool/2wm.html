<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>二维码生成- WGH</title>
<style>
:root{--primary:#4361ee;--secondary:#f72585;--gradient:linear-gradient(135deg,var(--primary),var(--secondary));}*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif;}body{background:linear-gradient(135deg,#f5f7ff 0%,#f0f4ff 100%);min-height:100vh;padding:20px;}.container{max-width:800px;margin:0 auto;}.header{text-align:center;margin-bottom:30px;padding:30px 0;}.title{font-size:2rem;font-weight:800;margin-bottom:10px;background:var(--gradient);-webkit-background-clip:text;background-clip:text;color:transparent;}.subtitle{color:#666;}.tool-container{background:white;border-radius:20px;padding:30px;box-shadow:0 8px 30px rgba(0,0,0,0.08);}.input-group{margin-bottom:20px;}label{display:block;margin-bottom:8px;font-weight:600;}.url-input{width:100%;padding:12px;border:2px solid #e0e0e0;border-radius:10px;font-size:1rem;}.options-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:15px;margin:20px 0;}.generate-btn{background:var(--gradient);color:white;border:none;padding:12px;border-radius:25px;font-weight:600;cursor:pointer;width:100%;margin:10px 0;}.generate-btn:disabled{background:#ccc;cursor:not-allowed;}.timer-text{text-align:center;color:#f72585;font-weight:600;margin:10px 0;}.result-section{text-align:center;padding:20px;border:2px dashed #e0e0e0;border-radius:15px;margin-top:20px;background:#f8faff;}#qrCode{margin:10px auto;}.download-btn{background:#f72585;color:white;border:none;padding:10px 20px;border-radius:20px;text-decoration:none;margin-top:10px;display:inline-block;}
</style>
<script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
</head>
<body>
<div class="container">
<div class="header">
<h1 class="title">二维码生成</h1>
<p class="subtitle">wghub免费快速生成，支持网址、文本等</p>
</div>
<div class="tool-container">
<div class="input-group">
<label for="qrContent">输入内容</label>
<input type="text" id="qrContent" class="url-input" placeholder="输入..." value="https://wghub.netlify.app">
</div>
<div class="options-grid">
<div class="option-group">
<label for="qrSize">尺寸</label>
<input type="range" id="qrSize" min="100" max="200" value="150">
<span>150px</span>
</div>
</div>
<div class="timer-text" id="timerText" style="display:none">请等待 <span id="countdown">60</span> 秒后再生成</div>
<button class="generate-btn" id="generateBtn" onclick="generateQRCode()">生成</button>
<div class="result-section">
<div id="qrPlaceholder">二维码输出</div>
<div id="qrCode"></div>
<a href="#" class="download-btn" id="downloadBtn" download="qrcode.jpg" style="display:none">下载 JPG</a>
</div>
</div>
</div>
<p class="subtitle">https://hub.j47v.top</p>
<script>
let canGenerate = true;
let countdown = 60;

function generateQRCode(){
if(!canGenerate) return;
const content=document.getElementById('qrContent').value;
const size=parseInt(document.getElementById('qrSize').value);
const qrContainer=document.getElementById('qrCode');
const placeholder=document.getElementById('qrPlaceholder');
const downloadBtn=document.getElementById('downloadBtn');
const generateBtn=document.getElementById('generateBtn');
const timerText=document.getElementById('timerText');
if(!content){alert('请输入内容');return;}
placeholder.style.display='none';
qrContainer.innerHTML='';
const qr=qrcode(0,'M');
qr.addData(content);
qr.make();
const qrImage=qr.createImgTag(10,0);
qrContainer.innerHTML=qrImage;
const img=qrContainer.querySelector('img');
img.style.width=size+'px';
img.style.height=size+'px';
const canvas=document.createElement('canvas');
const ctx=canvas.getContext('2d');
canvas.width=size;
canvas.height=size;
const tempImg=new Image();
tempImg.onload=function(){
ctx.drawImage(tempImg,0,0,size,size);
const jpgDataUrl=canvas.toDataURL('image/jpeg',0.8);
downloadBtn.href=jpgDataUrl;
downloadBtn.style.display='inline-block';};
tempImg.src=img.src;
canGenerate=false;
generateBtn.disabled=true;
timerText.style.display='block';
startCountdown();}

function startCountdown(){
const countdownElement=document.getElementById('countdown');
const generateBtn=document.getElementById('generateBtn');
const timerText=document.getElementById('timerText');
const interval=setInterval(()=>{
countdown--;
countdownElement.textContent=countdown;
if(countdown<=0){
clearInterval(interval);
canGenerate=true;
generateBtn.disabled=false;
timerText.style.display='none';
countdown=60;
}},1000);}

document.getElementById('qrSize').addEventListener('input',function(){
document.querySelector('#qrSize+span').textContent=this.value+'px';});
</script>
</body>
</html>
