<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>菜单 - WG</title>
    <style>
        :root {
            --primary: #4361ee;
            --secondary: #f72585;
            --private: #8b5cf6;
            --gradient: linear-gradient(135deg, var(--primary), var(--secondary));
            --private-gradient: linear-gradient(135deg, var(--private), #c084fc);
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }
        body {
            background: linear-gradient(135deg, #f5f7ff 0%, #f0f4ff 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            max-width: 600px;
            width: 100%;
            text-align: center;
        }
        h1 {
            background: var(--gradient);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 10px;
            font-size: 2.5rem;
        }
        .subtitle {
            color: #666;
            margin-bottom: 30px;
        }
        .repo-option {
            background: #f8f9fa;
            border: 2px solid #e9ecef;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
        }
        .repo-option:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        .repo-option.private {
            border-color: var(--private);
            background: linear-gradient(135deg, #faf5ff, #f3e8ff);
        }
        .repo-option.private:hover {
            border-color: #8b5cf6;
            box-shadow: 0 10px 25px rgba(139, 92, 246, 0.2);
        }
        .repo-option.active {
            border-color: var(--primary);
            background: linear-gradient(135deg, #f0f4ff, #e6f0ff);
        }
        .repo-option.private.active {
            border-color: var(--private);
            background: linear-gradient(135deg, #f3e8ff, #e9d5ff);
        }
        .repo-name {
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 10px;
        }
        .repo-option:not(.private) .repo-name {
            color: var(--primary);
        }
        .repo-option.private .repo-name {
            color: var(--private);
        }
        .repo-desc {
            color: #666;
            margin-bottom: 15px;
        }
        .repo-url {
            background: white;
            padding: 8px 12px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 0.9rem;
            color: #333;
            border: 1px solid #ddd;
        }
        .private-badge {
            position: absolute;
            top: 10px;
            right: 15px;
            background: var(--private-gradient);
            color: white;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 0.8rem;
            font-weight: 600;
        }
        .save-btn {
            background: var(--gradient);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 25px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
            transition: all 0.3s ease;
        }
        .save-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(67, 97, 238, 0.3);
        }
        .current-selection {
            margin-top: 20px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 10px;
            color: #666;
        }
        .section-title {
            text-align: left;
            font-size: 1.2rem;
            font-weight: 600;
            margin: 30px 0 15px 0;
            color: var(--text-dark);
            border-left: 4px solid var(--primary);
            padding-left: 12px;
        }
        .private-section .section-title {
            border-left-color: var(--private);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔧 菜单</h1>
        <p class="subtitle">选择您要使用的资源仓库</p>
        
        <!-- 公共仓库 -->
        <div class="public-section">
            <div class="section-title">官方仓库</div>
            <div id="repoList">
                <!-- 公列-->
            </div>
        </div>
        
        <!-- 私人仓库 -->
        <div class="private-section">
            <div class="section-title">第三方仓库</div>
            <div id="privateRepoList">
                <!-- 私列-->
            </div>
        </div>
        
        <button class="save-btn" onclick="saveSelection()">💾 保存设置</button>
        
        <div class="current-selection" id="currentSelection">
            选择
        </div>
    </div>

    <script>
        // === 配置 ===
        const REPOSITORIES = {
          
            'main': {
                name: '默认仓库',
                desc: '外部服务器，内容丰富',
                baseUrl: 'http://wghub.ct.ws',
                paths: {
                    pic: '/main/pic.php',
                    mus: '/main/mus.php',
                    text: '/main/text.php'
                }
            },
          
            '本站仓库': {
                name: '本站仓库', 
                desc: '本站资源，性能好功能多',
                baseUrl: 'https://wghub.netlify.app',
                paths: {
                    pic: '/main/pic.html',
                    text: '/main/text.html'
                }
            }
        };
      
      
//包装
      /*  // === 私仓 ===
        const PRIVATE_REPOSITORIES = {
            'private1': {
                name: '私人仓库1',
                desc: '个人专用服务器',
                baseUrl: 'https://private1.example.com',
                paths: {
                    pic: '/images',
                    mus: '/music',
                    text: '/code'
                },
                isPrivate: true
            },


        };*/ 

        let selectedRepo = '';

        // 初始化
        window.onload = function() {
            renderRepoList();
            renderPrivateRepoList();
            loadSavedSelection();
        };

        // 渲染公仓
        function renderRepoList() {
            const repoList = document.getElementById('repoList');
            repoList.innerHTML = '';

            Object.entries(REPOSITORIES).forEach(([repoId, repo]) => {
                const repoElement = createRepoElement(repoId, repo, false);
                repoList.appendChild(repoElement);
            });
        }

        // 渲染私仓
        function renderPrivateRepoList() {
            const privateRepoList = document.getElementById('privateRepoList');
            privateRepoList.innerHTML = '';

            Object.entries(PRIVATE_REPOSITORIES).forEach(([repoId, repo]) => {
                const repoElement = createRepoElement(repoId, repo, true);
                privateRepoList.appendChild(repoElement);
            });
        }

        // 创建
        function createRepoElement(repoId, repo, isPrivate) {
            const repoElement = document.createElement('div');
            repoElement.className = `repo-option ${isPrivate ? 'private' : ''}`;
            repoElement.onclick = () => selectRepo(repoId, isPrivate);
            
            let badge = '';
            if (isPrivate) {
                badge = '<div class="private-badge">私人</div>';
            }
            
            repoElement.innerHTML = `
                ${badge}
                <div class="repo-name">${repo.name}</div>
                <p class="repo-desc">${repo.desc}</p>
                <div class="repo-url">${repo.baseUrl}</div>
            `;
            
            return repoElement;
        }

        // 保存
        function loadSavedSelection() {
            const savedRepo = localStorage.getItem('selectedRepo');
            if (savedRepo) {
                // 检查
                if (REPOSITORIES[savedRepo]) {
                    selectRepo(savedRepo, false, false);
                } else if (PRIVATE_REPOSITORIES[savedRepo]) {
                    selectRepo(savedRepo, true, false);
                }
                updateCurrentSelection(savedRepo);
            }
        }

        // 选择
        function selectRepo(repoId, isPrivate = false, updateUI = true) {
            selectedRepo = repoId;
            
            if (updateUI) {
                // 清除
                document.querySelectorAll('.repo-option').forEach(option => {
                    option.classList.remove('active');
                });
                event.currentTarget.classList.add('active');
            } else {
                
                const allRepoElements = document.querySelectorAll('.repo-option');
                allRepoElements.forEach(element => {
                   
                    if (element.textContent.includes(REPOSITORIES[repoId]?.name) || 
                        element.textContent.includes(PRIVATE_REPOSITORIES[repoId]?.name)) {
                        element.classList.add('active');
                    }
                });
            }
            
            updateCurrentSelection(repoId);
        }

        // 保存
        function saveSelection() {
            if (!selectedRepo) {
                alert('请先选择一个仓库！');
                return;
            }
            
            // 保存本地
            localStorage.setItem('selectedRepo', selectedRepo);
            
            // 保存完整配置
            const repoConfig = REPOSITORIES[selectedRepo] || PRIVATE_REPOSITORIES[selectedRepo];
            localStorage.setItem('repositoryConfig', JSON.stringify(repoConfig));
            
            alert('✅ 仓库设置已保存！\n返回首页后导航栏链接将自动更新。');
           
        }

        // === 页面调用 ===
        function getCurrentRepository() {
            const repoId = localStorage.getItem('selectedRepo') || 'main';
            return REPOSITORIES[repoId] || PRIVATE_REPOSITORIES[repoId] || REPOSITORIES.main;
        }

        function getNavLinks() {
            const repo = getCurrentRepository();
            return {
                pic: repo.baseUrl + repo.paths.pic,
                mus: repo.baseUrl + repo.paths.mus,
                text: repo.baseUrl + repo.paths.text
            };
        }
    </script>
</body>
</html>
